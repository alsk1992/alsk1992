<svg fill="none" viewBox="0 0 900 320" width="900" height="320" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .frame {
          width: 100%;
          height: 320px;
          background: linear-gradient(135deg, #00f0ff, #a855f7, #00f0ff);
          background-size: 300% 300%;
          animation: border-flow 6s ease infinite;
          padding: 2px;
        }

        .panel {
          width: 100%;
          height: 100%;
          background: #06060c;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          position: relative;
          overflow: hidden;
        }

        .noise {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          background-image:
            radial-gradient(ellipse at 15% 50%, rgba(0,240,255,0.03) 0%, transparent 50%),
            radial-gradient(ellipse at 85% 50%, rgba(168,85,247,0.03) 0%, transparent 50%);
          z-index: 0;
        }

        .content {
          position: relative;
          z-index: 1;
          text-align: center;
        }

        .name {
          font-family: 'Courier New', monospace;
          font-size: 4.5rem;
          font-weight: 900;
          letter-spacing: 0.5em;
          color: #ffffff;
          line-height: 1;
        }

        .line {
          width: 60px;
          height: 2px;
          background: linear-gradient(90deg, #00f0ff, #a855f7);
          margin: 18px auto;
        }

        .title {
          font-family: 'Courier New', monospace;
          font-size: 0.9rem;
          letter-spacing: 0.35em;
          text-transform: uppercase;
          color: #8888a0;
          margin-bottom: 28px;
        }

        .stats {
          display: flex;
          gap: 48px;
          align-items: center;
        }

        .stat {
          text-align: center;
        }

        .stat-value {
          font-family: 'Courier New', monospace;
          font-size: 1.5rem;
          font-weight: 700;
          letter-spacing: 0.05em;
          color: #00f0ff;
        }

        .stat-value.purple { color: #a855f7; }
        .stat-value.white { color: #e4e4ed; }

        .stat-label {
          font-family: 'Courier New', monospace;
          font-size: 0.75rem;
          letter-spacing: 0.25em;
          text-transform: uppercase;
          color: #a0a0b8;
          margin-top: 6px;
        }

        .divider {
          width: 1px;
          height: 32px;
          background: #1e1e30;
        }

        @keyframes border-flow {
          0% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
          100% { background-position: 0% 50%; }
        }

        @media (prefers-reduced-motion) {
          .frame { animation: none; }
        }
      </style>

      <div class="frame">
        <div class="panel">
          <div class="noise"></div>

          <div class="content">
            <div class="name">ALSK</div>
            <div class="line"></div>
            <div class="title">Web3 Engineer · DeFi · HFT · Smart Contracts</div>

            <div class="stats">
              <div class="stat">
                <div class="stat-value">50K+</div>
                <div class="stat-label">Clones</div>
              </div>
              <div class="divider"></div>
              <div class="stat">
                <div class="stat-value purple">1,000+</div>
                <div class="stat-label">Markets</div>
              </div>
              <div class="divider"></div>
              <div class="stat">
                <div class="stat-value white">&lt;6ms</div>
                <div class="stat-label">Execution</div>
              </div>
              <div class="divider"></div>
              <div class="stat">
                <div class="stat-value">119</div>
                <div class="stat-label">Skills</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
